<div formGroupName="equipments">
  <label for="equipment-to-add">Equipments</label>
  <input #equipment id="equipment-to-add" />
  <button id="add-equipment" (click)="addEquipment(equipment.value)">
    Add
  </button>
  @for(control of equipmentRecord.controls | keyvalue; track control){
  <div>
    <label [for]="'eq-' + control.key">{{ control.key }}</label>
    <input
      [id]="'eq-' + control.key"
      type="checkbox"
      class="equipment"
      formControlName="control.key"
    />
    <button class="remove-equipment" (click)="removeEquipment(control.key)">
      Remove equipment
    </button>
  </div>
  }
</div>
