<h1 [textContent]="title()" [style]="dynamicStyle()"></h1>
<p [textContent]="user().name"></p>
<p> {{ formattedSpeed | json }}</p>

<p>{{ races() }} races</p>
<textarea (keydown.space)="onSpacePress()">press space!</textarea>
<div>

        <h2> no races found </h2>
    }@else{
        <h2> yay, we have one man </h2>
    }
</div>
